
<!doctype html>
<html lang="cs">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pexeso pro babi</title>
    <link rel="stylesheet" href="styles.css" />

    
</head>

<body>
    <main class="container">
        <header class="topbar">
            
<a href="https://hankaxx.github.io/homepage/"
     aria-label="Přejít na domovskou stránku">🏠 Domů</a>

            <h1>Pexeso pro babi</h1>
            <div class="stats">
                <div>⏱️ Čas: <span id="time">0:00</span></div>
                <div>🎯 Tahy: <span id="moves">0</span></div>
            </div>
            <div class="actions">
                <label>
                    Velikost:
                    <select id="size" aria-label="velikost hrací plochy">
                        <option value="4">4×4 (8 párů)</option>
                        <option value="6">6×6 (18 párů)</option>
                    </select>
                </label>
                <button id="restart" type="button" aria-label="restart hry">↻ Restart</button>
            </div>
        </header>

        <section id="board" class="board" aria-label="Herní plocha"></section>

        <footer class="footer">
            Do složky <code>img/</code> vlož fotky pojmenované <code>img1.jpg</code>, <code>img2.jpg</code> …
        </footer>
    </main>

    <script src="app.js" defer></script>
</body>
</html>
